name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./tests/ -count=1 -timeout 60s -v

      - name: Build binaries
        run: |
          name="${{ github.event.repository.name }}"
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o "dist/${name}-linux-amd64" .
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o "dist/${name}-linux-arm64" .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o "dist/${name}-darwin-amd64" .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o "dist/${name}-darwin-arm64" .
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o "dist/${name}-windows-amd64.exe" .

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --title "${{ github.ref_name }}" \
            --generate-notes
